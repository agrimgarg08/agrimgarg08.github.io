name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # Re-fetch GitHub data daily at midnight UTC so contributions stay current
    - cron: '0 0 * * *'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # REPO_NAME is empty for username.github.io user sites
      REPO_NAME: ''
    steps:
      - uses: actions/checkout@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Fetch GitHub contribution data
        # Fine-grained PAT stored as GH_DATA_TOKEN repo secret — never baked into the bundle
        env:
          GH_DATA_TOKEN: ${{ secrets.GH_DATA_TOKEN }}
          GITHUB_HANDLE: agrimgarg08
        run: node scripts/fetch-github-data.mjs

      - name: Build and export static site
        run: pnpm run export

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
